<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>My Todo List</h1>
        <p class="subtitle">Stay organized. One task at a time.</p>
        <button id="toggle" style="margin-top:10px;">🌙 Dark Mode</button>
      </header>

      <section class="card">
        <form id="todo-form" class="todo-form" autocomplete="off">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="What needs to be done?"
            required
          />
          <button type="submit" class="btn-add">Add</button>
        </form>

        <p id="error-message" class="error-message" hidden></p>

        <!-- ✅ Progress Bar Added -->
        <div class="progress-bar">
          <div id="progress"></div>
        </div>

        <ul id="todo-list" class="todo-list"></ul>

        <p id="empty-message" class="empty-message">No tasks available 🚀</p>
      </section>

      <footer class="footer">
        <span id="count">0 tasks</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
